<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Maestro SiDGBE | Control Total V12.0</title>
    
    <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --gob-green: #0C231E;
            --gob-gold: #D4C19C;
            --ia-purple: #6366f1;
        }

        body { background-color: #ebedef; font-family: 'Open Sans', sans-serif; overflow-x: hidden; }
        
        .navbar-admin { background-color: var(--gob-green); padding: 15px; color: white; border-bottom: 4px solid var(--gob-gold); }
        .card-admin { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #ddd; }
        .section-title { font-weight: 800; text-transform: uppercase; font-size: 13px; color: var(--gob-green); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }

        /* Estilo IA Optimizado para Extracción */
        .ia-box { background: #f4f6ff; border: 1px solid var(--ia-purple); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn-ia { background-color: var(--ia-purple) !important; color: white !important; font-weight: 800; border: none; padding: 10px; width: 100%; border-radius: 4px; text-transform: uppercase; font-size: 11px; cursor: pointer; }

        .btn-registrar { background-color: var(--gob-green) !important; color: white !important; font-weight: bold; padding: 15px; border: none; border-radius: 4px; width: 100%; text-transform: uppercase; }
        
        label { font-weight: 700; color: #555; text-transform: uppercase; font-size: 10px; margin-top: 8px; display: block; }
        .form-control { border-radius: 4px; height: 38px; font-size: 14px; font-weight: 600; }
        
        /* Monitor con scroll suave */
        .monitor-scroll { height: 600px; overflow-y: auto; background: white; border-radius: 8px; }
        .stat-card { background: var(--gob-green); color: white; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card h3 { color: var(--gob-gold); font-weight: 900; font-size: 30px; margin: 0; }
        
        /* Modales */
        #login-overlay, #qr-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(12, 35, 30, 0.98); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        #qr-modal { background: rgba(0,0,0,0.85); display: none; }
        .modal-content-custom { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; border-top: 10px solid var(--gob-gold); }
        
        .badge-visitas { background: var(--gob-gold); color: var(--gob-green); font-weight: 900; padding: 2px 6px; border-radius: 4px; }
        .folio-box { background: #fffcf5; border: 2px dashed #D4C19C; padding: 10px; text-align: center; font-family: monospace; font-size: 16px; font-weight: 900; color: #c0392b; margin: 10px 0; }

        /* Optimización de rendimiento para tablas grandes */
        tr { contain: layout; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="modal-content-custom" style="max-width: 320px;">
            <h5 style="font-weight: 900; color: var(--gob-green);">SiDGBE ADMIN</h5>
            <input type="password" id="token-input" class="form-control" placeholder="CLAVE MAESTRA" style="text-align: center; margin-bottom: 10px;">
            <input type="password" id="api-key-input" class="form-control" placeholder="API KEY OPENAI (EXTRACCIÓN)" style="text-align: center; border-color: var(--ia-purple);">
            <button onclick="intentarLogin()" class="btn-registrar" style="margin-top: 15px;">ENTRAR</button>
        </div>
    </div>

    <div id="qr-modal">
        <div class="modal-content-custom">
            <h4 style="font-weight: 900;">VINCULACIÓN EXITOSA</h4>
            <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
            <div id="folio-final" class="folio-box">--</div>
            <button class="btn btn-danger btn-block" onclick="cerrarModalQR()">FINALIZAR</button>
        </div>
    </div>

    <nav class="navbar-admin">
        <div class="container-fluid">
            <div class="row">
                <div class="col-xs-6"><b>SiDGBE | CONTROL V12.0</b></div>
                <div class="col-xs-6 text-right"><span id="reloj"></span></div>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="margin-top: 20px;">
        <div class="row">
            <div class="col-md-5">
                
                <div class="ia-box">
                    <label style="color: var(--ia-purple);">Asistente de Extracción Rápida (WhatsApp)</label>
                    <textarea id="whatsapp-input" class="form-control" rows="2" placeholder="Pega el mensaje del cliente aquí..." style="margin-bottom: 10px;"></textarea>
                    <button onclick="procesarConIA()" id="btn-ia" class="btn-ia">AUTO-RELLENAR FORMULARIO</button>
                </div>

                <div class="card-admin">
                    <div class="section-title"><span>Nuevo Registro Manual</span></div>
                    <form id="adminForm">
                        <label>Nivel Educativo:</label>
                        <select id="nivel" class="form-control" required onchange="actualizarInterfazNivel()">
                            <option value="" disabled selected>-- SELECCIONE --</option>
                            <option value="Primaria">PRIMARIA (INEA)</option>
                            <option value="Secundaria">SECUNDARIA (INEA)</option>
                            <option value="Preparatoria">PREPARATORIA</option>
                        </select>

                        <div class="row">
                            <div class="col-sm-8">
                                <label>Nombre Completo:</label>
                                <input type="text" id="nombre" class="form-control" required style="text-transform: uppercase;">
                            </div>
                            <div class="col-sm-4">
                                <label>Promedio:</label>
                                <input type="text" id="promedio" class="form-control" placeholder="9.5" required>
                            </div>
                        </div>

                        <label>CURP:</label>
                        <input type="text" id="curp" class="form-control" maxlength="18" required style="text-transform: uppercase; font-family: monospace;">

                        <div class="row">
                            <div class="col-sm-6"><label>Ciclo:</label><input type="text" id="ciclo" class="form-control" required></div>
                            <div class="col-sm-6"><label>Emisión:</label><input type="date" id="fechaEmision" class="form-control" required></div>
                        </div>

                        <label>Folio Automático:</label>
                        <input type="text" id="folio" class="form-control" readonly style="background: #f9f9f9; color: #c0392b; text-align: center; font-weight: bold;">

                        <button type="submit" id="btnGuardar" class="btn-registrar" style="margin-top: 20px;">GENERAR Y ACTIVAR QR</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="row">
                    <div class="col-sm-6">
                        <div class="stat-card">
                            <small>REGISTROS</small>
                            <h3 id="stat-total">0</h3>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="stat-card" style="background: #1d4d42;">
                            <small>SISTEMA</small>
                            <h3 style="font-size: 20px; color: #2ecc71;">ESTABLE</h3>
                        </div>
                    </div>
                </div>

                <div class="card-admin" style="margin-top: 20px;">
                    <div class="section-title">
                        <span>Historial Reciente</span>
                        <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Buscar..." style="width: 180px; border-radius: 15px; padding: 2px 10px; border: 1px solid #ccc;">
                    </div>
                    
                    <div class="monitor-scroll">
                        <table class="table table-condensed">
                            <thead>
                                <tr style="font-size: 10px; background: #f4f4f4;">
                                    <th>FOLIO / DATOS</th>
                                    <th class="text-center">VISTAS</th>
                                    <th class="text-right">ACCIONES</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAlumnos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqlOQFN104R7MymHW5r7JJ2Mc3UymViZ4",
            authDomain: "siged-86634.firebaseapp.com",
            projectId: "siged-86634",
            storageBucket: "siged-86634.firebasestorage.app",
            messagingSenderId: "787103426645",
            appId: "1:787103426645:web:4268b3cc891fc14c0a0cdc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let API_KEY_OPENAI = "";

        window.intentarLogin = () => {
            if(document.getElementById('token-input').value === "MASTER2026") {
                API_KEY_OPENAI = document.getElementById('api-key-input').value;
                document.getElementById('login-overlay').style.display = 'none';
                iniciarMonitor();
            } else { alert("ACCESO DENEGADO"); }
        };

        // Folio Automático Inteligente
        function generarFolio(nivel) {
            const p = { "Primaria": "PRI", "Secundaria": "SEC", "Preparatoria": "PREP" }[nivel] || "DOC";
            const rand = Math.random().toString(36).substring(2, 7).toUpperCase();
            return `SEP-${p}-${rand}-${Date.now().toString().slice(-3)}`;
        }

        window.actualizarInterfazNivel = () => {
            const n = document.getElementById("nivel").value;
            document.getElementById("folio").value = generarFolio(n);
            
            // Predeterminados por nivel
            const d = { 
                "Primaria": ["2018-2019", "2019-07-15", "9.0"], 
                "Secundaria": ["2021-2022", "2022-07-10", "8.8"], 
                "Preparatoria": ["2024-2025", "2025-08-05", "9.2"] 
            };
            if(d[n]) {
                document.getElementById("ciclo").value = d[n][0];
                document.getElementById("fechaEmision").value = d[n][1];
                document.getElementById("promedio").value = d[n][2];
            }
        };

        // IA Útil: Extraer datos de WhatsApp para no escribir a mano
        window.procesarConIA = async () => {
            const text = document.getElementById('whatsapp-input').value;
            if(!text || !API_KEY_OPENAI) return alert("Pega el texto y asegúrate de tener la API Key");
            
            const btn = document.getElementById('btn-ia');
            btn.innerText = "EXTRAYENDO..."; btn.disabled = true;

            try {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY_OPENAI}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{
                            role: "system", content: "Extract to JSON: {nombre, curp, nivel, promedio}. Nivel must be: Primaria, Secundaria, Preparatoria."
                        }, { role: "user", content: text }],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await res.json();
                const info = JSON.parse(data.choices[0].message.content);
                
                if(info.nombre) document.getElementById('nombre').value = info.nombre.toUpperCase();
                if(info.curp) document.getElementById('curp').value = info.curp.toUpperCase();
                if(info.nivel) {
                    document.getElementById('nivel').value = info.nivel;
                    actualizarInterfazNivel();
                }
            } catch (e) { alert("Error al conectar con IA"); }
            finally { btn.innerText = "AUTO-RELLENAR FORMULARIO"; btn.disabled = false; }
        };

        // Guardar Registro
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = document.getElementById('folio').value;
            const d = {
                nombre: document.getElementById('nombre').value.toUpperCase(),
                curp: document.getElementById('curp').value.toUpperCase(),
                promedio: document.getElementById('promedio').value,
                ciclo: document.getElementById('ciclo').value,
                fechaEmision: document.getElementById('fechaEmision').value,
                nivel: document.getElementById('nivel').value,
                visitas: 0, activo: true,
                createdAt: Date.now() // Para ordenar
            };

            await setDoc(doc(db, "certificados", f), d);
            
            const qrC = document.getElementById("qrcode");
            qrC.innerHTML = "";
            new QRCode(qrC, {
                text: `https://registro-nacional-siged-sep.github.io/Validacion-de-Documentos-Academicos-Electronicos/?folio=${f}`,
                width: 180, height: 180, colorDark : "#0C231E"
            });
            
            document.getElementById("folio-final").innerText = f;
            document.getElementById("qr-modal").style.display = "flex";
        });

        window.cerrarModalQR = () => {
            document.getElementById("qr-modal").style.display = "none";
            document.getElementById("adminForm").reset();
        };

        // Monitor Optimizado: Los últimos creados aparecen primero
        function iniciarMonitor() {
            // Usamos query y orderBy para que los últimos registros (createdAt) salgan arriba
            const q = query(collection(db, "certificados"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const t = document.getElementById('tablaAlumnos');
                t.innerHTML = "";
                let count = 0;
                snapshot.forEach(docu => {
                    count++;
                    const data = docu.data();
                    const id = docu.id;
                    t.innerHTML += `<tr>
                        <td>
                            <small style="color:#c0392b; font-weight:bold;">${id}</small><br>
                            <b style="font-size:12px;">${data.nombre}</b><br>
                            <small>${data.curp}</small>
                        </td>
                        <td class="text-center"><span class="badge-visitas">${data.visitas}</span></td>
                        <td class="text-right">
                            <button onclick="borrar('${id}')" class="btn btn-danger btn-xs">ELIMINAR</button>
                        </td>
                    </tr>`;
                });
                document.getElementById('stat-total').innerText = count;
            });
        }

        window.borrar = async (id) => { if(confirm("¿Eliminar registro?")) await deleteDoc(doc(db, "certificados", id)); };
        
        window.filtrarTabla = () => {
            const val = document.getElementById("buscador").value.toUpperCase();
            document.querySelectorAll("#tablaAlumnos tr").forEach(f => {
                f.style.display = f.innerText.toUpperCase().includes(val) ? "" : "none";
            });
        };

        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
    </html>
