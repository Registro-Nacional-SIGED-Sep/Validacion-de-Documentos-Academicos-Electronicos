<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Maestro SiDGBE | AI & PDF Automation V8.0</title>
    
    <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Open Sans', sans-serif; padding-bottom: 50px; }
        .navbar-admin { background-color: #0C231E; padding: 20px; color: white; margin-bottom: 30px; }
        .card-admin { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-top: 5px solid #D4C19C; margin-bottom: 30px; }
        
        /* Estilo para la sección de IA */
        .ia-container { background: #eef2ff; border: 2px solid #6366f1; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-ia { background-color: #6366f1 !important; color: white !important; font-weight: bold; width: 100%; padding: 12px; border: none; border-radius: 6px; margin-top: 10px; }
        
        .btn-registrar { background-color: #12322B !important; color: white !important; font-weight: bold; padding: 14px; border-radius: 6px; width: 100%; border: none; }
        .form-control { border-radius: 6px; height: 45px; border: 1px solid #ccc; margin-bottom: 15px; }
        label { font-weight: bold; color: #444; text-transform: uppercase; font-size: 11px; margin-bottom: 8px; display: block; }
        
        #campos-especiales { display: none; background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #D4C19C; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0C231E; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        
        /* Contenedor invisible para renderizar PDF */
        #pdf-render-area { position: absolute; left: -9999px; top: -9999px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://framework-gb.cdn.gob.mx/gobmx/img/logo_blanco.svg" width="160" style="filter: brightness(0); margin-bottom: 25px;">
            <h4 style="font-weight: 900; color: #13322B;">ACCESO PROPIETARIO</h4>
            <div class="form-group">
                <input type="password" id="token-input" class="form-control" placeholder="CLAVE MAESTRA" style="text-align: center;">
                <input type="password" id="api-key-input" class="form-control" placeholder="PEGAR OPENAI API KEY" style="text-align: center; border-color: #6366f1;">
            </div>
            <button onclick="intentarLogin()" class="btn-registrar">ACTIVAR SISTEMA</button>
            <p id="error-login" style="color: red; display: none; margin-top: 10px;">Clave incorrecta.</p>
        </div>
    </div>

    <nav class="navbar-admin text-center">
        <h4 style="margin:0;">PANEL MAESTRO AUTOMATIZADO V8.0</h4>
    </nav>

    <div class="container-fluid" style="max-width: 1400px;">
        <div class="row">
            
            <div class="col-md-5">
                
                <div class="ia-container">
                    <label style="color: #4338ca;">🤖 ASISTENTE DE EXTRACCIÓN IA</label>
                    <textarea id="whatsapp-input" class="form-control" rows="4" placeholder="Pega aquí el mensaje desordenado del cliente..."></textarea>
                    <button onclick="procesarConIA()" id="btn-ia" class="btn-ia">PROCESAR Y LLENAR FORMULARIO</button>
                </div>

                <div class="card-admin">
                    <form id="adminForm">
                        <label>Tipo de Documento:</label>
                        <select id="nivel" class="form-control" required onchange="aplicarValoresPorDefecto()">
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="Primaria">PRIMARIA (INEA)</option>
                            <option value="Secundaria">SECUNDARIA (INEA)</option>
                            <option value="Preparatoria">PREPARATORIA</option>
                        </select>

                        <div class="row">
                            <div class="col-sm-6">
                                <label>Folio:</label>
                                <input type="text" id="folio" class="form-control" required style="text-transform: uppercase;">
                            </div>
                            <div class="col-sm-6">
                                <label>Calificación:</label>
                                <input type="text" id="promedio" class="form-control" required>
                            </div>
                        </div>

                        <label>Nombre Completo:</label>
                        <input type="text" id="nombre" class="form-control" required style="text-transform: uppercase;">

                        <label>CURP:</label>
                        <input type="text" id="curp" class="form-control" maxlength="18" required style="text-transform: uppercase;">

                        <div class="row">
                            <div class="col-sm-6">
                                <label>Ciclo:</label>
                                <input type="text" id="ciclo" class="form-control" required>
                            </div>
                            <div class="col-sm-6">
                                <label>Ciudad / Estado:</label>
                                <input type="text" id="ubicacion" class="form-control" placeholder="Ej: Toluca, EdoMex">
                            </div>
                        </div>
                        
                        <input type="hidden" id="fechaEmision">

                        <button type="submit" id="btnGuardar" class="btn btn-registrar">VINCULAR Y DESCARGAR PDF</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="monitor-container">
                    <h4 style="font-weight: bold; color: #13322B;">Monitor de Registros</h4>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Folio / Nombre</th>
                                    <th class="text-center">Estado</th>
                                    <th class="text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAlumnos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-render-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqlOQFN104R7MymHW5r7JJ2Mc3UymViZ4",
            authDomain: "siged-86634.firebaseapp.com",
            projectId: "siged-86634",
            storageBucket: "siged-86634.firebasestorage.app",
            messagingSenderId: "787103426645",
            appId: "1:787103426645:web:4268b3cc891fc14c0a0cdc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let MI_LLAVE_OPENAI = "";

        // LOGIN Y CARGA DE LLAVE
        window.intentarLogin = () => {
            const token = document.getElementById('token-input').value.trim();
            const apiKey = document.getElementById('api-key-input').value.trim();
            
            if (token === "MASTER2026") {
                MI_LLAVE_OPENAI = apiKey; // Se guarda solo en memoria
                document.getElementById('login-overlay').style.display = 'none';
                iniciarMonitor();
            } else {
                document.getElementById('error-login').style.display = 'block';
            }
        };

        // --- MOTOR DE INTELIGENCIA ARTIFICIAL ---
        window.procesarConIA = async () => {
            if(!MI_LLAVE_OPENAI) { alert("No ingresaste la API Key de OpenAI"); return; }
            const textoBusqueda = document.getElementById('whatsapp-input').value;
            const btn = document.getElementById('btn-ia');
            
            btn.innerText = "🤖 CEREBRO TRABAJANDO...";
            btn.disabled = true;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${MI_LLAVE_OPENAI}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{
                            role: "system",
                            content: "Extrae datos de certificado mexicano. Devuelve SOLO un JSON con: nombre (MAYUSCULAS CON ACENTOS), curp (18 chars), nivel (Primaria, Secundaria o Preparatoria), ubicacion (Ciudad y Estado). Si no hay datos, deja vacio."
                        }, {
                            role: "user",
                            content: textoBusqueda
                        }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const info = JSON.parse(data.choices[0].message.content);

                // Llenado automático
                if(info.nombre) document.getElementById('nombre').value = info.nombre;
                if(info.curp) document.getElementById('curp').value = info.curp;
                if(info.ubicacion) document.getElementById('ubicacion').value = info.ubicacion;
                if(info.nivel) {
                    document.getElementById('nivel').value = info.nivel;
                    aplicarValoresPorDefecto();
                }
                
                // Generar folio aleatorio si está vacío
                document.getElementById('folio').value = "SEP-" + Math.floor(Math.random() * 999999);

            } catch (e) { alert("Error con IA: " + e.message); }
            finally {
                btn.innerText = "PROCESAR Y LLENAR FORMULARIO";
                btn.disabled = false;
            }
        };

        // VALORES POR DEFECTO
        window.aplicarValoresPorDefecto = () => {
            const nivel = document.getElementById("nivel").value;
            if(nivel === "Primaria") {
                document.getElementById("ciclo").value = "2017-2018";
                document.getElementById("fechaEmision").value = "2018-07-07";
                document.getElementById("promedio").value = "9.0";
            } else if(nivel === "Secundaria") {
                document.getElementById("ciclo").value = "2020-2021";
                document.getElementById("fechaEmision").value = "2021-07-12";
                document.getElementById("promedio").value = "9.2";
            } else if(nivel === "Preparatoria") {
                document.getElementById("ciclo").value = "2024-2025";
                document.getElementById("fechaEmision").value = "2025-08-20";
                document.getElementById("promedio").value = "8.8";
            }
        };

        // --- MOTOR DE GENERACIÓN DE PDF ---
        async function generarCertificadoPDF(datos, folio) {
            const area = document.getElementById('pdf-render-area');
            
            // 1. Elegir la plantilla según el nivel
            let plantillaHTML = "";
            if(datos.nivel === "Primaria") plantillaHTML = PLANTILLAS.primaria(datos, folio);
            else if(datos.nivel === "Secundaria") plantillaHTML = PLANTILLAS.secundaria(datos, folio);
            else plantillaHTML = PLANTILLAS.prepa(datos, folio);

            area.innerHTML = plantillaHTML;

            // 2. Generar el QR dentro del HTML del PDF
            const qrDiv = area.querySelector('#qr-pdf');
            const urlFinal = `https://registro-nacional-siged-sep.github.io/Validacion-de-Documentos-Academicos-Electronicos/?folio=${folio}`;
            new QRCode(qrDiv, { text: urlFinal, width: 120, height: 120 });

            // 3. Convertir a PDF y descargar
            const opt = {
                margin: 0,
                filename: `CERTIFICADO_${datos.nombre}_${folio}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            await html2pdf().set(opt).from(area).save();
        }

        // GUARDAR Y DISPARAR TODO
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            const folio = document.getElementById('folio').value.toUpperCase().trim();
            btn.disabled = true;

            const datos = {
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                curp: document.getElementById('curp').value.toUpperCase().trim(),
                promedio: document.getElementById('promedio').value,
                ciclo: document.getElementById('ciclo').value,
                nivel: document.getElementById('nivel').value,
                ubicacion: document.getElementById('ubicacion').value,
                fechaEmision: document.getElementById("fechaEmision").value,
                activo: true,
                visitas: 0,
                timestamp: new Date()
            };

            try {
                await setDoc(doc(db, "certificados", folio), datos);
                await generarCertificadoPDF(datos, folio);
                alert("Registro Exitoso y PDF Generado.");
            } catch (error) { alert(error.message); }
            finally { btn.disabled = false; }
        });

        // MONITOR
        function iniciarMonitor() {
            onSnapshot(collection(db, "certificados"), (snap) => {
                const tbody = document.getElementById('tablaAlumnos');
                tbody.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const id = docSnap.id;
                    tbody.innerHTML += `<tr>
                        <td><strong>${id}</strong><br><small>${d.nombre}</small></td>
                        <td class="text-center">${d.activo ? '✅' : '🚫'}</td>
                        <td class="text-right">
                            <button class="btn btn-xs btn-warning" onclick="cambiarEstado('${id}', ${!d.activo})">Alternar</button>
                            <button class="btn btn-xs btn-danger" onclick="borrarRegistro('${id}')">X</button>
                        </td>
                    </tr>`;
                });
            });
        }

        window.cambiarEstado = async (id, s) => await updateDoc(doc(db, "certificados", id), { activo: s });
        window.borrarRegistro = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "certificados", id)); };

        // ==========================================================
        //  AQUÍ PUEDES PEGAR TUS CÓDIGOS HTML (PLANTILLAS)
        // ==========================================================
        const PLANTILLAS = {
            primaria: (d, f) => `
                <div style="padding:50px; font-family:Arial;">
                    <h1>CERTIFICADO DE PRIMARIA</h1>
                    <p>Nombre: ${d.nombre}</p>
                    <p>CURP: ${d.curp}</p>
                    <p>Folio: ${f}</p>
                    <div id="qr-pdf"></div>
                    </div>
            `,
            secundaria: (d, f) => `
                <div style="padding:50px; font-family:serif;">
                    <h1>CERTIFICADO DE SECUNDARIA</h1>
                    <p>Nombre: ${d.nombre}</p>
                    <p>CURP: ${d.curp}</p>
                    <div id="qr-pdf"></div>
                    </div>
            `,
            prepa: (d, f) => `
                <div style="padding:50px; border:10px solid #691c32;">
                    <h1>CERTIFICADO DE BACHILLERATO</h1>
                    <p>Titular: ${d.nombre}</p>
                    <div id="qr-pdf"></div>
                    </div>
            `
        };
    </script>
</body>
</html>
