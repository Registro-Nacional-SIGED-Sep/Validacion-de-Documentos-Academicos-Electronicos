<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Maestro SiDGBE | V8.5 Ultra</title>
    
    <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Open Sans', sans-serif; padding-bottom: 100px; }
        .navbar-admin { background-color: #0C231E; padding: 25px; color: white; border-bottom: 5px solid #D4C19C; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card-admin { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid #D4C19C; margin-bottom: 40px; }
        .ia-container { background: #f0f4ff; border: 2px dashed #6366f1; padding: 30px; border-radius: 15px; margin-bottom: 30px; }
        .btn-ia { background-color: #6366f1 !important; color: white !important; font-weight: 800; width: 100%; padding: 16px; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-registrar { background-color: #12322B !important; color: white !important; font-weight: 800; padding: 18px; border-radius: 10px; width: 100%; border: none; cursor: pointer; font-size: 16px; }
        .form-control { border-radius: 10px; height: 50px; border: 1px solid #ced4da; margin-bottom: 25px; padding: 12px 15px; font-size: 15px; width: 100%; }
        label { font-weight: 700; color: #13322B; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; display: block; letter-spacing: 0.5px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0C231E; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 60px; border-radius: 25px; width: 90%; max-width: 480px; text-align: center; }
        
        /* Área de renderizado invisible pero con tamaño real */
        #pdf-render-area { 
            position: absolute; 
            left: -5000px; 
            top: 0; 
            width: 816px; 
            height: 1056px; 
            background: white;
        }

        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .bg-active { background: #dcfce7; color: #166534; }
        .bg-inactive { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://framework-gb.mx/gobmx/img/logo_blanco.svg" width="200" style="filter: brightness(0); margin-bottom: 35px;">
            <h2 style="font-weight: 900; color: #13322B;">ADMINISTRADOR V8.5</h2>
            <p style="color: #666; margin-bottom: 30px;">Ingrese sus credenciales de propietario</p>
            <input type="password" id="token-input" class="form-control" placeholder="CONTRASEÑA MAESTRA" style="text-align: center;">
            <input type="password" id="api-key-input" class="form-control" placeholder="API KEY OPENAI" style="text-align: center; border-color: #6366f1;">
            <button onclick="intentarLogin()" class="btn-registrar">INICIAR SESIÓN</button>
            <p id="error-login" style="color: red; display: none; margin-top: 20px; font-weight: bold;">⚠️ Acceso denegado.</p>
        </div>
    </div>

    <nav class="navbar-admin text-center">
        <h3 style="margin:0; font-weight: 800;">SISTEMA DE GESTIÓN ACADÉMICA SiDGBE</h3>
    </nav>

    <div class="container" style="max-width: 1350px; margin-top: 40px;">
        <div class="row">
            <div class="col-md-5">
                <div class="ia-container">
                    <label style="color: #4338ca;">🤖 ASISTENTE INTELIGENTE</label>
                    <textarea id="whatsapp-input" class="form-control" rows="4" placeholder="Pega los datos del cliente aquí..."></textarea>
                    <button onclick="procesarConIA()" id="btn-ia" class="btn-ia">AUTOMATIZAR LLENADO</button>
                </div>

                <div class="card-admin">
                    <form id="adminForm">
                        <label>Nivel de Estudios:</label>
                        <select id="nivel" class="form-control" required onchange="aplicarValoresPorDefecto()">
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="Primaria">PRIMARIA (INEA)</option>
                            <option value="Secundaria">SECUNDARIA (INEA)</option>
                            <option value="Preparatoria">PREPARATORIA</option>
                        </select>

                        <div class="row">
                            <div class="col-sm-6"><label>Folio Oficial:</label><input type="text" id="folio" class="form-control" required></div>
                            <div class="col-sm-6"><label>Calificación:</label><input type="text" id="promedio" class="form-control" required></div>
                        </div>

                        <label>Nombre Completo:</label>
                        <input type="text" id="nombre" class="form-control" required style="text-transform: uppercase;">

                        <label>CURP:</label>
                        <input type="text" id="curp" class="form-control" maxlength="18" required style="text-transform: uppercase;">

                        <div class="row">
                            <div class="col-sm-6"><label>Ciclo:</label><input type="text" id="ciclo" class="form-control" required></div>
                            <div class="col-sm-6"><label>Entidad/Ciudad:</label><input type="text" id="ubicacion" class="form-control"></div>
                        </div>
                        
                        <input type="hidden" id="fechaEmision">
                        <button type="submit" id="btnGuardar" class="btn-registrar">REGISTRAR Y DESCARGAR PDF</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card-admin">
                    <h4 style="font-weight: 800; color: #13322B; margin-bottom: 25px;">Historial de Certificados</h4>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Folio / Nombre</th>
                                <th>Estatus</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAlumnos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-render-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqlOQFN104R7MymHW5r7JJ2Mc3UymViZ4",
            authDomain: "siged-86634.firebaseapp.com",
            projectId: "siged-86634",
            storageBucket: "siged-86634.firebasestorage.app",
            messagingSenderId: "787103426645",
            appId: "1:787103426645:web:4268b3cc891fc14c0a0cdc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let API_KEY_IA = "";

        window.intentarLogin = () => {
            if(document.getElementById('token-input').value === "MASTER2026") {
                API_KEY_IA = document.getElementById('api-key-input').value;
                document.getElementById('login-overlay').style.display = 'none';
                iniciarMonitor();
            } else { alert("Acceso Incorrecto"); }
        };

        window.procesarConIA = async () => {
            const btn = document.getElementById('btn-ia');
            btn.innerText = "⏳ ANALIZANDO..."; btn.disabled = true;
            try {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY_IA}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: "Extrae: nombre (MAYUS), curp (18 chars), nivel (Primaria, Secundaria o Preparatoria), ubicacion. Responde SOLO JSON." },
                            { role: "user", content: document.getElementById('whatsapp-input').value }
                        ],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await res.json();
                const info = JSON.parse(data.choices[0].message.content);
                document.getElementById('nombre').value = info.nombre || "";
                document.getElementById('curp').value = info.curp || "";
                document.getElementById('ubicacion').value = info.ubicacion || "";
                if(info.nivel) { document.getElementById('nivel').value = info.nivel; aplicarValoresPorDefecto(); }
                document.getElementById('folio').value = "SEP-" + Math.floor(100000 + Math.random() * 800000);
            } catch (e) { alert("Error IA"); }
            finally { btn.innerText = "AUTOMATIZAR LLENADO"; btn.disabled = false; }
        };

        window.aplicarValoresPorDefecto = () => {
            const n = document.getElementById("nivel").value;
            if(n === "Primaria") { setV("2017-2018", "2018-07-07", "9.0"); }
            else if(n === "Secundaria") { setV("2020-2021", "2021-07-12", "9.2"); }
            else { setV("2024-2025", "2025-08-20", "8.8"); }
        };
        function setV(c, f, p) { 
            document.getElementById("ciclo").value = c; 
            document.getElementById("fechaEmision").value = f; 
            document.getElementById("promedio").value = p; 
        }

        async function generarDocumentoPDF(datos, folio) {
            const contenedor = document.getElementById('pdf-render-area');
            const tipo = datos.nivel === "Primaria" ? "primaria" : datos.nivel === "Secundaria" ? "secundaria" : "prepa";
            
            // Inyectamos el HTML de la plantilla
            contenedor.innerHTML = PLANTILLAS[tipo](datos, folio);
            
            // Generar el QR dentro de la plantilla
            const qrElem = contenedor.querySelector('#qr-pdf');
            new QRCode(qrElem, {
                text: `https://registro-nacional-siged-sep.github.io/Validacion-de-Documentos-Academicos-Electronicos/?folio=${folio}`,
                width: 110, height: 110
            });

            // CRÍTICO: Esperar a que la imagen de fondo cargue realmente
            const imgFondo = contenedor.querySelector('.img-fondo-cert');
            
            const renderizar = async () => {
                const opt = {
                    margin: 0,
                    filename: `CERTIFICADO_${datos.nombre}.pdf`,
                    image: { type: 'jpeg', quality: 1 },
                    html2canvas: { 
                        scale: 3, // Mayor calidad
                        useCORS: true, 
                        logging: false,
                        letterRendering: true
                    },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                await html2pdf().set(opt).from(contenedor).save();
                contenedor.innerHTML = ""; // Limpiar
            };

            if (imgFondo.complete) {
                setTimeout(renderizar, 1500); // Pequeño delay extra por seguridad
            } else {
                imgFondo.onload = () => setTimeout(renderizar, 1500);
            }
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true; btn.innerText = "⏳ PROCESANDO...";
            
            const folio = document.getElementById('folio').value.toUpperCase().trim();
            const datos = {
                nombre: document.getElementById('nombre').value.toUpperCase(),
                curp: document.getElementById('curp').value.toUpperCase(),
                promedio: document.getElementById('promedio').value,
                ciclo: document.getElementById('ciclo').value,
                nivel: document.getElementById('nivel').value,
                ubicacion: document.getElementById('ubicacion').value,
                fechaEmision: document.getElementById("fechaEmision").value,
                activo: true, timestamp: new Date()
            };

            try {
                await setDoc(doc(db, "certificados", folio), datos);
                await generarDocumentoPDF(datos, folio);
                alert("✅ Guardado Exitoso");
            } catch (err) { alert("Error Firebase"); }
            finally { btn.disabled = false; btn.innerText = "REGISTRAR Y DESCARGAR PDF"; }
        });

        function iniciarMonitor() {
            onSnapshot(collection(db, "certificados"), (snap) => {
                const b = document.getElementById('tablaAlumnos');
                b.innerHTML = "";
                snap.forEach(d => {
                    const alu = d.data();
                    b.innerHTML += `<tr>
                        <td><b>${d.id}</b><br>${alu.nombre}</td>
                        <td><span class="status-pill ${alu.activo ? 'bg-active' : 'bg-inactive'}">${alu.activo ? 'ACTIVO' : 'BAJA'}</span></td>
                        <td class="text-right">
                            <button onclick="eliminar('${d.id}')" class="btn btn-danger btn-xs">Borrar</button>
                        </td>
                    </tr>`;
                });
            });
        }
        window.eliminar = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "certificados", id)); };

        const PLANTILLAS = {
            primaria: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; background:white;">
                    <img class="img-fondo-cert" src="https://i.ibb.co/pBY0vH8z/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-410a625b.jpg" style="width:100%; height:100%;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold; font-family:sans-serif; color:black;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold; font-family:sans-serif; color:black;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt; font-family:sans-serif;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt; font-family:sans-serif;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px; border:1px solid #ccc;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold; font-family:sans-serif;">${d.promedio}</div>
                </div>`,
            secundaria: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; background:white;">
                    <img class="img-fondo-cert" src="https://i.ibb.co/68v8P7yv/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-01306346.jpg" style="width:100%; height:100%;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold; font-family:sans-serif; color:black;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold; font-family:sans-serif; color:black;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt; font-family:sans-serif;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt; font-family:sans-serif;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px; border:1px solid #ccc;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold; font-family:sans-serif;">${d.promedio}</div>
                </div>`,
            prepa: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; background:white;">
                    <img class="img-fondo-cert" src="https://i.ibb.co/hR8S8pXh/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-37c223c6.jpg" style="width:100%; height:100%;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold; font-family:sans-serif; color:black;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold; font-family:sans-serif; color:black;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt; font-family:sans-serif;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt; font-family:sans-serif;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px; border:1px solid #ccc;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold; font-family:sans-serif;">${d.promedio}</div>
                </div>`
        };
    </script>
</body>
</html>
