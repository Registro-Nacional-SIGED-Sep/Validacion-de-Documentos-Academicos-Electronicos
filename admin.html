<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Maestro SiDGBE | V8.2 Pro</title>
    
    <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Open Sans', sans-serif; padding-bottom: 50px; }
        .navbar-admin { background-color: #0C231E; padding: 20px; color: white; margin-bottom: 30px; border-bottom: 4px solid #D4C19C; }
        .card-admin { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-top: 5px solid #D4C19C; margin-bottom: 30px; }
        .ia-container { background: #eef2ff; border: 2px solid #6366f1; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); }
        .btn-ia { background-color: #6366f1 !important; color: white !important; font-weight: bold; width: 100%; padding: 15px; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-ia:hover { background-color: #4f46e5 !important; }
        .btn-registrar { background-color: #12322B !important; color: white !important; font-weight: bold; padding: 16px; border-radius: 8px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .btn-registrar:hover { background-color: #1a4d42 !important; }
        .form-control { border-radius: 8px; height: 48px; border: 1px solid #ccc; margin-bottom: 20px; width: 100%; padding: 12px; font-size: 14px; }
        label { font-weight: bold; color: #13322B; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; display: block; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0C231E; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 50px; border-radius: 20px; width: 95%; max-width: 450px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #pdf-render-area { position: absolute; left: -9999px; top: -9999px; width: 816px; height: 1056px; }
        .monitor-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .monitor-table th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        .monitor-table td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://framework-gb.cdn.gob.mx/gobmx/img/logo_blanco.svg" width="180" style="filter: brightness(0); margin-bottom: 30px;">
            <h3 style="font-weight: 900; color: #13322B; margin-bottom: 20px;">SISTEMA MAESTRO V8.2</h3>
            <input type="password" id="token-input" class="form-control" placeholder="CLAVE DE ACCESO" style="text-align: center;">
            <input type="password" id="api-key-input" class="form-control" placeholder="PEGAR OPENAI API KEY" style="text-align: center; border-color: #6366f1;">
            <button onclick="intentarLogin()" class="btn-registrar">DESBLOQUEAR PANEL</button>
            <p id="error-login" style="color: red; display: none; margin-top: 15px; font-weight: bold;">⚠️ Clave no válida.</p>
        </div>
    </div>

    <nav class="navbar-admin text-center">
        <h2 style="margin:0; letter-spacing: 2px;">PANEL DE AUTOMATIZACIÓN SiDGBE</h2>
    </nav>

    <div class="container-fluid" style="max-width: 1400px;">
        <div class="row">
            <div class="col-md-5">
                <div class="ia-container">
                    <label style="color: #4338ca; font-size: 14px;">🤖 IA EXTRACTORA DE WHATSAPP</label>
                    <textarea id="whatsapp-input" class="form-control" rows="5" placeholder="Pega aquí el texto que te mandó el cliente..."></textarea>
                    <button onclick="procesarConIA()" id="btn-ia" class="btn-ia">ANALIZAR DATOS CON IA</button>
                </div>

                <div class="card-admin">
                    <form id="adminForm">
                        <label>Grado Académico:</label>
                        <select id="nivel" class="form-control" required onchange="aplicarValoresPorDefecto()">
                            <option value="" disabled selected>Seleccione el nivel...</option>
                            <option value="Primaria">PRIMARIA (INEA)</option>
                            <option value="Secundaria">SECUNDARIA (INEA)</option>
                            <option value="Preparatoria">PREPARATORIA</option>
                        </select>

                        <div class="row">
                            <div class="col-sm-6"><label>Folio de Registro:</label><input type="text" id="folio" class="form-control" required style="text-transform: uppercase;"></div>
                            <div class="col-sm-6"><label>Promedio Final:</label><input type="text" id="promedio" class="form-control" required placeholder="Ej: 9.5"></div>
                        </div>

                        <label>Nombre del Alumno (Completo):</label>
                        <input type="text" id="nombre" class="form-control" required style="text-transform: uppercase;">

                        <label>CURP (18 Dígitos):</label>
                        <input type="text" id="curp" class="form-control" maxlength="18" required style="text-transform: uppercase;">

                        <div class="row">
                            <div class="col-sm-6"><label>Ciclo Escolar:</label><input type="text" id="ciclo" class="form-control" required></div>
                            <div class="col-sm-6"><label>Estado / Ciudad:</label><input type="text" id="ubicacion" class="form-control" placeholder="Ej: Puebla, Pue."></div>
                        </div>
                        
                        <input type="hidden" id="fechaEmision">
                        
                        <button type="submit" id="btnGuardar" class="btn-registrar">VINCULAR REGISTRO Y GENERAR PDF</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card-admin">
                    <h4 style="font-weight: bold; color: #13322B; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Monitor de Alumnos Registrados</h4>
                    <div class="table-responsive">
                        <table class="monitor-table">
                            <thead>
                                <tr>
                                    <th>Folio / Nombre</th>
                                    <th>Estado</th>
                                    <th class="text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAlumnos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-render-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqlOQFN104R7MymHW5r7JJ2Mc3UymViZ4",
            authDomain: "siged-86634.firebaseapp.com",
            projectId: "siged-86634",
            storageBucket: "siged-86634.firebasestorage.app",
            messagingSenderId: "787103426645",
            appId: "1:787103426645:web:4268b3cc891fc14c0a0cdc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let OPENAI_KEY = "";

        window.intentarLogin = () => {
            const token = document.getElementById('token-input').value.trim();
            const key = document.getElementById('api-key-input').value.trim();
            if (token === "MASTER2026") {
                OPENAI_KEY = key;
                document.getElementById('login-overlay').style.display = 'none';
                iniciarMonitor();
            } else {
                document.getElementById('error-login').style.display = 'block';
            }
        };

        window.procesarConIA = async () => {
            if(!OPENAI_KEY) return alert("Por favor pegue su API Key de OpenAI");
            const btn = document.getElementById('btn-ia');
            const texto = document.getElementById('whatsapp-input').value;
            if(!texto) return alert("El campo de texto está vacío.");

            btn.innerText = "⏳ IA ANALIZANDO..."; btn.disabled = true;
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: "Extrae: nombre (MAYUS), curp (18 chars), nivel (Primaria, Secundaria o Preparatoria), ubicacion (Ciudad y Estado). Entrega SOLO JSON." },
                            { role: "user", content: texto }
                        ],
                        response_format: { type: "json_object" }
                    })
                });
                
                const raw = await response.json();
                const info = JSON.parse(raw.choices[0].message.content);
                
                if(info.nombre) document.getElementById('nombre').value = info.nombre;
                if(info.curp) document.getElementById('curp').value = info.curp;
                if(info.ubicacion) document.getElementById('ubicacion').value = info.ubicacion;
                if(info.nivel) { 
                    document.getElementById('nivel').value = info.nivel; 
                    aplicarValoresPorDefecto(); 
                }
                document.getElementById('folio').value = "SEP-" + Math.floor(100000 + Math.random() * 900000);
            } catch (err) {
                console.error(err);
                alert("Error al conectar con OpenAI. Verifique su API Key.");
            } finally {
                btn.innerText = "ANALIZAR DATOS CON IA"; btn.disabled = false;
            }
        };

        window.aplicarValoresPorDefecto = () => {
            const nivel = document.getElementById("nivel").value;
            const configs = {
                "Primaria": ["2017-2018", "2018-07-07", "9.0"],
                "Secundaria": ["2020-2021", "2021-07-12", "9.2"],
                "Preparatoria": ["2024-2025", "2025-08-20", "8.8"]
            };
            if(configs[nivel]) {
                document.getElementById("ciclo").value = configs[nivel][0];
                document.getElementById("fechaEmision").value = configs[nivel][1];
                document.getElementById("promedio").value = configs[nivel][2];
            }
        };

        async function ejecutarDescargaPDF(datos, folio) {
            const area = document.getElementById('pdf-render-area');
            const nivelSlug = datos.nivel === "Primaria" ? "primaria" : datos.nivel === "Secundaria" ? "secundaria" : "prepa";
            
            // Inyectar plantilla
            area.innerHTML = PLANTILLAS[nivelSlug](datos, folio);
            
            // Generar QR
            const qrBox = area.querySelector('#qr-pdf');
            new QRCode(qrBox, {
                text: `https://registro-nacional-siged-sep.github.io/Validacion-de-Documentos-Academicos-Electronicos/?folio=${folio}`,
                width: 110, height: 110, colorDark: "#000000", colorLight: "#ffffff"
            });

            const opciones = {
                margin: 0,
                filename: `CERTIFICADO_${datos.nombre}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Esperar 1 segundo para asegurar carga de imágenes
            setTimeout(async () => {
                await html2pdf().set(opciones).from(area).save();
                area.innerHTML = ""; // Limpiar área
            }, 1000);
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true; btn.innerText = "💾 GUARDANDO...";
            
            const f = document.getElementById('folio').value.toUpperCase().trim();
            const payload = {
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                curp: document.getElementById('curp').value.toUpperCase().trim(),
                promedio: document.getElementById('promedio').value,
                ciclo: document.getElementById('ciclo').value,
                nivel: document.getElementById('nivel').value,
                ubicacion: document.getElementById('ubicacion').value,
                fechaEmision: document.getElementById("fechaEmision").value,
                activo: true,
                timestamp: new Date()
            };

            try {
                await setDoc(doc(db, "certificados", f), payload);
                await ejecutarDescargaPDF(payload, f);
                alert("¡Proceso completado! Registro en Firebase y PDF generado.");
            } catch (err) {
                alert("Error Firebase: " + err.message);
            } finally {
                btn.disabled = false; btn.innerText = "VINCULAR REGISTRO Y GENERAR PDF";
            }
        });

        function iniciarMonitor() {
            onSnapshot(collection(db, "certificados"), (snapshot) => {
                const tabla = document.getElementById('tablaAlumnos');
                tabla.innerHTML = "";
                snapshot.forEach(docAlu => {
                    const d = docAlu.data();
                    const id = docAlu.id;
                    tabla.innerHTML += `
                        <tr>
                            <td><b>${id}</b><br><small>${d.nombre}</small></td>
                            <td><span class="badge ${d.activo ? 'badge-success' : 'badge-danger'}">${d.activo ? 'ACTIVO' : 'BAJA'}</span></td>
                            <td class="text-right">
                                <button class="btn btn-xs btn-warning" onclick="toggleStatus('${id}', ${!d.activo})">Status</button>
                                <button class="btn btn-xs btn-danger" onclick="eliminar('${id}')">Borrar</button>
                            </td>
                        </tr>`;
                });
            });
        }

        window.toggleStatus = async (id, stat) => await updateDoc(doc(db, "certificados", id), { activo: stat });
        window.eliminar = async (id) => { if(confirm("¿Eliminar permanentemente?")) await deleteDoc(doc(db, "certificados", id)); };

        const PLANTILLAS = {
            primaria: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; background:white;">
                    <img src="https://i.ibb.co/pBY0vH8z/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-410a625b.jpg" style="width:100%; height:100%; position:absolute;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold; font-family:sans-serif;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold; font-family:sans-serif;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt; font-family:sans-serif;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt; font-family:sans-serif;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold; font-family:sans-serif;">${d.promedio}</div>
                </div>`,
            secundaria: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; background:white;">
                    <img src="https://i.ibb.co/68v8P7yv/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-01306346.jpg" style="width:100%; height:100%; position:absolute;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold; font-family:sans-serif;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold; font-family:sans-serif;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt; font-family:sans-serif;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt; font-family:sans-serif;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold; font-family:sans-serif;">${d.promedio}</div>
                </div>`,
            prepa: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; background:white;">
                    <img src="https://i.ibb.co/hR8S8pXh/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-37c223c6.jpg" style="width:100%; height:100%; position:absolute;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold; font-family:sans-serif;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold; font-family:sans-serif;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt; font-family:sans-serif;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt; font-family:sans-serif;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold; font-family:sans-serif;">${d.promedio}</div>
                </div>`
        };
    </script>
</body>
</html>
