<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Maestro SiDGBE | V8.0 Corregida</title>
    
    <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Open Sans', sans-serif; padding-bottom: 50px; }
        .navbar-admin { background-color: #0C231E; padding: 20px; color: white; margin-bottom: 30px; }
        .card-admin { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-top: 5px solid #D4C19C; margin-bottom: 30px; }
        .ia-container { background: #eef2ff; border: 2px solid #6366f1; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-ia { background-color: #6366f1 !important; color: white !important; font-weight: bold; width: 100%; padding: 12px; border: none; border-radius: 6px; margin-top: 10px; cursor: pointer; }
        .btn-registrar { background-color: #12322B !important; color: white !important; font-weight: bold; padding: 14px; border-radius: 6px; width: 100%; border: none; cursor: pointer; }
        .form-control { border-radius: 6px; height: 45px; border: 1px solid #ccc; margin-bottom: 15px; width: 100%; padding: 10px; }
        label { font-weight: bold; color: #444; text-transform: uppercase; font-size: 11px; margin-bottom: 8px; display: block; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0C231E; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        #pdf-render-area { position: absolute; left: -9999px; top: -9999px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://framework-gb.mx/gobmx/img/logo_blanco.svg" width="160" style="filter: brightness(0); margin-bottom: 25px;">
            <h4 style="font-weight: 900; color: #13322B;">ACCESO PROPIETARIO</h4>
            <input type="password" id="token-input" class="form-control" placeholder="CLAVE MAESTRA" style="text-align: center;">
            <input type="password" id="api-key-input" class="form-control" placeholder="OPENAI API KEY" style="text-align: center; border-color: #6366f1;">
            <button onclick="intentarLogin()" class="btn-registrar">ACTIVAR SISTEMA</button>
            <p id="error-login" style="color: red; display: none; margin-top: 10px;">Acceso denegado.</p>
        </div>
    </div>

    <nav class="navbar-admin text-center">
        <h4 style="margin:0;">PANEL MAESTRO AUTOMATIZADO V8.0</h4>
    </nav>

    <div class="container-fluid" style="max-width: 1300px;">
        <div class="row">
            <div class="col-md-5">
                <div class="ia-container">
                    <label style="color: #4338ca;">🤖 ASISTENTE DE EXTRACCIÓN IA</label>
                    <textarea id="whatsapp-input" class="form-control" rows="4" placeholder="Pega el mensaje del cliente aquí..."></textarea>
                    <button onclick="procesarConIA()" id="btn-ia" class="btn-ia">PROCESAR DATOS</button>
                </div>

                <div class="card-admin">
                    <form id="adminForm">
                        <label>Tipo de Documento:</label>
                        <select id="nivel" class="form-control" required onchange="aplicarValoresPorDefecto()">
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="Primaria">PRIMARIA (INEA)</option>
                            <option value="Secundaria">SECUNDARIA (INEA)</option>
                            <option value="Preparatoria">PREPARATORIA</option>
                        </select>

                        <div class="row">
                            <div class="col-sm-6"><label>Folio:</label><input type="text" id="folio" class="form-control" required></div>
                            <div class="col-sm-6"><label>Promedio:</label><input type="text" id="promedio" class="form-control" required></div>
                        </div>

                        <label>Nombre Completo:</label>
                        <input type="text" id="nombre" class="form-control" required style="text-transform: uppercase;">

                        <label>CURP:</label>
                        <input type="text" id="curp" class="form-control" maxlength="18" required style="text-transform: uppercase;">

                        <div class="row">
                            <div class="col-sm-6"><label>Ciclo:</label><input type="text" id="ciclo" class="form-control" required></div>
                            <div class="col-sm-6"><label>Ubicación:</label><input type="text" id="ubicacion" class="form-control"></div>
                        </div>
                        <input type="hidden" id="fechaEmision">
                        <button type="submit" id="btnGuardar" class="btn-registrar">GUARDAR Y DESCARGAR PDF</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card-admin">
                    <h4 style="font-weight: bold; color: #13322B;">Monitor de Registros</h4>
                    <table class="table">
                        <thead><tr><th>Folio / Alumno</th><th>Estado</th><th class="text-right">Acciones</th></tr></thead>
                        <tbody id="tablaAlumnos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-render-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqlOQFN104R7MymHW5r7JJ2Mc3UymViZ4",
            authDomain: "siged-86634.firebaseapp.com",
            projectId: "siged-86634",
            storageBucket: "siged-86634.firebasestorage.app",
            messagingSenderId: "787103426645",
            appId: "1:787103426645:web:4268b3cc891fc14c0a0cdc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let API_KEY = "";

        window.intentarLogin = () => {
            const token = document.getElementById('token-input').value.trim();
            const key = document.getElementById('api-key-input').value.trim();
            if (token === "MASTER2026") {
                API_KEY = key;
                document.getElementById('login-overlay').style.display = 'none';
                iniciarMonitor();
            } else { alert("Clave Incorrecta"); }
        };

        window.procesarConIA = async () => {
            if(!API_KEY) return alert("Pega tu API Key de OpenAI");
            const btn = document.getElementById('btn-ia');
            btn.innerText = "⏳ PROCESANDO..."; btn.disabled = true;
            
            try {
                const prompt = document.getElementById('whatsapp-input').value;
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: "Extrae de este mensaje: nombre (MAYUSCULAS), curp (18 chars), nivel (Primaria, Secundaria o Preparatoria), ubicacion (Ciudad y Estado). Responde solo JSON." },
                            { role: "user", content: prompt }
                        ],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);
                
                document.getElementById('nombre').value = res.nombre || "";
                document.getElementById('curp').value = res.curp || "";
                document.getElementById('ubicacion').value = res.ubicacion || "";
                if(res.nivel) { document.getElementById('nivel').value = res.nivel; aplicarValoresPorDefecto(); }
                document.getElementById('folio').value = "SEP-" + Math.floor(100000 + Math.random() * 900000);
            } catch (e) { alert("Error con la IA: " + e.message); }
            finally { btn.innerText = "PROCESAR DATOS"; btn.disabled = false; }
        };

        window.aplicarValoresPorDefecto = () => {
            const n = document.getElementById("nivel").value;
            const vals = {
                "Primaria": ["2017-2018", "2018-07-07", "9.0"],
                "Secundaria": ["2020-2021", "2021-07-12", "9.2"],
                "Preparatoria": ["2024-2025", "2025-08-20", "8.8"]
            };
            if(vals[n]) {
                document.getElementById("ciclo").value = vals[n][0];
                document.getElementById("fechaEmision").value = vals[n][1];
                document.getElementById("promedio").value = vals[n][2];
            }
        };

        async function descargarPDF(datos, folio) {
            const area = document.getElementById('pdf-render-area');
            const nivelKey = datos.nivel === "Primaria" ? "primaria" : datos.nivel === "Secundaria" ? "secundaria" : "prepa";
            area.innerHTML = PLANTILLAS[nivelKey](datos, folio);
            
            const qrTarget = area.querySelector('#qr-pdf');
            new QRCode(qrTarget, {
                text: `https://registro-nacional-siged-sep.github.io/Validacion-de-Documentos-Academicos-Electronicos/?folio=${folio}`,
                width: 110, height: 110
            });

            const opt = { margin: 0, filename: `${folio}_${datos.nombre}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter' } };
            await html2pdf().set(opt).from(area).save();
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            const f = document.getElementById('folio').value.toUpperCase().trim();
            const datos = {
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                curp: document.getElementById('curp').value.toUpperCase().trim(),
                promedio: document.getElementById('promedio').value,
                ciclo: document.getElementById('ciclo').value,
                nivel: document.getElementById('nivel').value,
                ubicacion: document.getElementById('ubicacion').value,
                fechaEmision: document.getElementById("fechaEmision").value,
                activo: true, timestamp: new Date()
            };
            try {
                await setDoc(doc(db, "certificados", f), datos);
                await descargarPDF(datos, f);
                alert("Guardado y descargado correctamente.");
            } catch (err) { alert("Error: " + err.message); }
            finally { btn.disabled = false; }
        });

        function iniciarMonitor() {
            onSnapshot(collection(db, "certificados"), (snap) => {
                const t = document.getElementById('tablaAlumnos');
                t.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    t.innerHTML += `<tr><td><b>${d.id}</b><br><small>${data.nombre}</small></td><td>${data.activo ? '✅' : '🚫'}</td><td class="text-right"><button onclick="borrar('${d.id}')" class="btn btn-danger btn-xs">Eliminar</button></td></tr>`;
                });
            });
        }
        window.borrar = async (id) => { if(confirm("¿Seguro?")) await deleteDoc(doc(db, "certificados", id)); };

        const PLANTILLAS = {
            primaria: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; font-family:Arial;">
                    <img src="https://i.ibb.co/pBY0vH8z/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-410a625b.jpg" style="width:100%; position:absolute;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold;">${d.promedio}</div>
                </div>`,
            secundaria: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; font-family:Arial;">
                    <img src="https://i.ibb.co/68v8P7yv/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-01306346.jpg" style="width:100%; position:absolute;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold;">${d.promedio}</div>
                </div>`,
            prepa: (d, f) => `
                <div style="width:816px; height:1056px; position:relative; font-family:Arial;">
                    <img src="https://i.ibb.co/hR8S8pXh/Imagen-de-Whats-App-2025-02-15-a-las-13-17-08-37c223c6.jpg" style="width:100%; position:absolute;">
                    <div style="position:absolute; top:365px; width:100%; text-align:center; font-size:19pt; font-weight:bold;">${d.nombre}</div>
                    <div style="position:absolute; top:422px; left:105px; font-size:11pt; letter-spacing:4px; font-weight:bold;">${d.curp}</div>
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt;">${d.ubicacion}</div>
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt;">FOLIO: ${f}</div>
                    <div id="qr-pdf" style="position:absolute; top:835px; right:100px; background:white; padding:5px;"></div>
                    <div style="position:absolute; top:735px; left:440px; font-size:12pt; font-weight:bold;">${d.promedio}</div>
                </div>`
        };
    </script>
</body>
</html>
