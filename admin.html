<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Maestro SiDGBE | V9.5 PostImages Edition</title>
    
    <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Open Sans', sans-serif; }
        .navbar-admin { background-color: #0C231E; padding: 20px; color: white; border-bottom: 4px solid #D4C19C; }
        .card-admin { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-top: 5px solid #D4C19C; margin-bottom: 30px; }
        .ia-container { background: #eef2ff; border: 2px solid #6366f1; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .btn-ia { background-color: #6366f1 !important; color: white !important; font-weight: bold; width: 100%; padding: 15px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-registrar { background-color: #12322B !important; color: white !important; font-weight: bold; padding: 16px; border-radius: 8px; width: 100%; border: none; cursor: pointer; }
        .form-control { border-radius: 8px; height: 48px; border: 1px solid #ccc; margin-bottom: 20px; width: 100%; padding: 12px; }
        label { font-weight: bold; color: #13322B; text-transform: uppercase; font-size: 11px; margin-bottom: 8px; display: block; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0C231E; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        /* Área de renderizado oculta para el PDF */
        #pdf-render-area { 
            position: absolute; 
            left: -10000px; 
            top: 0; 
            width: 816px; 
            height: 1056px; 
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h4 style="font-weight: 900; color: #13322B;">ACCESO MAESTRO</h4>
            <input type="password" id="token-input" class="form-control" placeholder="CLAVE" style="text-align: center;">
            <input type="password" id="api-key-input" class="form-control" placeholder="API KEY OPENAI" style="text-align: center; border-color: #6366f1;">
            <button onclick="intentarLogin()" class="btn-registrar">DESBLOQUEAR</button>
        </div>
    </div>

    <nav class="navbar-admin text-center">
        <h4 style="margin:0;">SISTEMA SiDGBE V9.5 | GENERACIÓN SEGURA</h4>
    </nav>

    <div class="container-fluid" style="max-width: 1300px; margin-top: 30px;">
        <div class="row">
            <div class="col-md-5">
                <div class="ia-container">
                    <label>🤖 EXTRACCIÓN POR IA</label>
                    <textarea id="whatsapp-input" class="form-control" rows="3" placeholder="Pega el mensaje de WhatsApp..."></textarea>
                    <button onclick="procesarConIA()" id="btn-ia" class="btn-ia">PROCESAR DATOS</button>
                </div>

                <div class="card-admin">
                    <form id="adminForm">
                        <label>Nivel del Documento:</label>
                        <select id="nivel" class="form-control" required onchange="aplicarValoresPorDefecto()">
                            <option value="" disabled selected>Seleccione el nivel...</option>
                            <option value="Primaria">PRIMARIA (INEA)</option>
                            <option value="Secundaria">SECUNDARIA (INEA)</option>
                            <option value="Preparatoria">PREPARATORIA</option>
                        </select>

                        <div class="row">
                            <div class="col-sm-6"><label>Folio:</label><input type="text" id="folio" class="form-control" required></div>
                            <div class="col-sm-6"><label>Promedio:</label><input type="text" id="promedio" class="form-control" required></div>
                        </div>

                        <label>Nombre Completo:</label>
                        <input type="text" id="nombre" class="form-control" required style="text-transform: uppercase;">

                        <label>CURP:</label>
                        <input type="text" id="curp" class="form-control" maxlength="18" required style="text-transform: uppercase;">

                        <div class="row">
                            <div class="col-sm-6"><label>Ciclo Escolar:</label><input type="text" id="ciclo" class="form-control" required></div>
                            <div class="col-sm-6"><label>Ubicación:</label><input type="text" id="ubicacion" class="form-control"></div>
                        </div>
                        <input type="hidden" id="fechaEmision">
                        <button type="submit" id="btnGuardar" class="btn-registrar">GUARDAR Y DESCARGAR PDF</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card-admin">
                    <h4>Monitor de Registros en la Nube</h4>
                    <table class="table"><tbody id="tablaAlumnos"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-render-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqlOQFN104R7MymHW5r7JJ2Mc3UymViZ4",
            authDomain: "siged-86634.firebaseapp.com",
            projectId: "siged-86634",
            storageBucket: "siged-86634.firebasestorage.app",
            messagingSenderId: "787103426645",
            appId: "1:787103426645:web:4268b3cc891fc14c0a0cdc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let API_KEY = "";

        // FUNCIÓN CLAVE: Evita que el PDF salga blanco al convertir la imagen a Base64 antes de procesar
        async function toDataURL(url) {
            const response = await fetch(url);
            const blob = await response.blob();
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        window.intentarLogin = () => {
            if(document.getElementById('token-input').value === "MASTER2026") {
                API_KEY = document.getElementById('api-key-input').value;
                document.getElementById('login-overlay').style.display = 'none';
                iniciarMonitor();
            }
        };

        window.procesarConIA = async () => {
            const btn = document.getElementById('btn-ia');
            btn.innerText = "⏳..."; btn.disabled = true;
            try {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{ role: "system", content: "Extrae JSON: nombre, curp, nivel, ubicacion." }, { role: "user", content: document.getElementById('whatsapp-input').value }],
                        response_format: { type: "json_object" }
                    })
                });
                const d = await res.json();
                const info = JSON.parse(d.choices[0].message.content);
                document.getElementById('nombre').value = info.nombre || "";
                document.getElementById('curp').value = info.curp || "";
                document.getElementById('ubicacion').value = info.ubicacion || "";
                if(info.nivel) { document.getElementById('nivel').value = info.nivel; aplicarValoresPorDefecto(); }
                document.getElementById('folio').value = "SEP-" + Math.floor(Math.random() * 999999);
            } catch (e) { alert("Error IA"); }
            finally { btn.innerText = "PROCESAR DATOS"; btn.disabled = false; }
        };

        window.aplicarValoresPorDefecto = () => {
            const n = document.getElementById("nivel").value;
            const c = { 
                "Primaria": ["2017-2018", "2018-07-07", "9.0"], 
                "Secundaria": ["2020-2021", "2021-07-12", "9.2"], 
                "Preparatoria": ["2024-2025", "2025-08-20", "8.8"] 
            };
            if(c[n]) { 
                document.getElementById("ciclo").value = c[n][0]; 
                document.getElementById("fechaEmision").value = c[n][1]; 
                document.getElementById("promedio").value = c[n][2]; 
            }
        };

        async function descargarPDF(datos, folio) {
            const area = document.getElementById('pdf-render-area');
            
            // TUS NUEVOS ENLACES DE POSTIMAGES
            const urls = {
                "Primaria": "https://i.postimg.cc/zBHtQcJQ/primaria-demo-1.png",
                "Secundaria": "https://i.postimg.cc/ZqCV9MyZ/secundaria-demo-1.png",
                "Preparatoria": "https://i.postimg.cc/D0yhLhQy/PDF-demo-1.png"
            };

            const base64Img = await toDataURL(urls[datos.nivel]);

            area.innerHTML = `
                <div id="capture-box" style="width:816px; height:1056px; position:relative; background:white;">
                    <img src="${base64Img}" style="width:100%; height:100%; position:absolute; top:0; left:0; z-index:1;">
                    
                    <div style="position:absolute; top:368px; width:100%; text-align:center; font-size:22pt; font-weight:bold; font-family:sans-serif; color:black; z-index:10;">
                        ${datos.nombre}
                    </div>
                    
                    <div style="position:absolute; top:425px; left:108px; font-size:12pt; letter-spacing:4.8px; font-weight:bold; font-family:monospace; color:black; z-index:10;">
                        ${datos.curp}
                    </div>
                    
                    <div style="position:absolute; top:865px; left:145px; font-size:10pt; font-family:sans-serif; z-index:10;">
                        ${datos.ubicacion}
                    </div>
                    
                    <div style="position:absolute; top:885px; left:145px; font-size:10pt; font-family:sans-serif; z-index:10;">
                        FOLIO: ${folio}
                    </div>
                    
                    <div id="qr-target" style="position:absolute; top:832px; right:102px; background:white; padding:4px; border:1px solid #000; z-index:10;"></div>
                    
                    <div style="position:absolute; top:736px; left:445px; font-size:13pt; font-weight:bold; font-family:sans-serif; z-index:10;">
                        ${datos.promedio}
                    </div>
                </div>`;

            // Generar el QR dinámico
            new QRCode(area.querySelector('#qr-target'), {
                text: `https://registro-nacional-siged-sep.github.io/Validacion-de-Documentos-Academicos-Electronicos/?folio=${folio}`,
                width: 110, height: 110
            });

            const opt = {
                margin: 0,
                filename: `CERTIFICADO_${datos.nombre}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            
            setTimeout(async () => {
                await html2pdf().set(opt).from(area.querySelector('#capture-box')).save();
                area.innerHTML = "";
            }, 1000);
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true; btn.innerText = "PROCESANDO...";
            
            const f = document.getElementById('folio').value.toUpperCase().trim();
            const d = {
                nombre: document.getElementById('nombre').value.toUpperCase(),
                curp: document.getElementById('curp').value.toUpperCase(),
                promedio: document.getElementById('promedio').value,
                ciclo: document.getElementById('ciclo').value,
                nivel: document.getElementById('nivel').value,
                ubicacion: document.getElementById('ubicacion').value,
                activo: true
            };

            try {
                await setDoc(doc(db, "certificados", f), d);
                await descargarPDF(d, f);
                alert("Documento generado y guardado con éxito.");
            } catch (err) { 
                console.error(err);
                alert("Error al conectar con Firebase."); 
            } finally { 
                btn.disabled = false; 
                btn.innerText = "GUARDAR Y DESCARGAR PDF"; 
            }
        });

        function iniciarMonitor() {
            onSnapshot(collection(db, "certificados"), (s) => {
                const t = document.getElementById('tablaAlumnos');
                t.innerHTML = "";
                s.forEach(d => {
                    t.innerHTML += `
                        <tr>
                            <td><b>${d.id}</b><br>${d.data().nombre}</td>
                            <td class="text-right">
                                <button onclick="eliminar('${d.id}')" class="btn btn-danger btn-xs">ELIMINAR</button>
                            </td>
                        </tr>`;
                });
            });
        }

        window.eliminar = async (id) => { 
            if(confirm("¿Estás seguro de eliminar este registro?")) {
                await deleteDoc(doc(db, "certificados", id)); 
            }
        };
    </script>
</body>
</html>
